<!DOCTYPE html>
<html>
<head>
	<title>Dungeon Crawler Admin</title>
	<style>
		body { font-family: monospace; max-width: 600px; margin: 40px auto; }
		label { display: block; margin: 8px 0 4px; }
		input, textarea { width: 100%; padding: 4px; box-sizing: border-box; }
		button { margin-top: 12px; padding: 8px 16px; }
		#status { margin-top: 8px; color: green; }
	</style>
</head>
<body>
	<h1>Dungeon Crawler Admin</h1>
	<form id="form">
		<label>Level</label>
		<input type="number" name="level" id="level" min="1">

		<label>Player HP</label>
		<input type="number" name="player_hp" id="player_hp" min="0">

		<label>Player Attack</label>
		<input type="number" name="player_attack" id="player_attack" min="0">

		<label>Player Defence</label>
		<input type="number" name="player_defence" id="player_defence" min="0">

		<label>Monster Positions (JSON array, e.g. [[1,1],[2,3]])</label>
		<textarea name="monster_positions" id="monster_positions" rows="3"></textarea>

		<button type="submit">Save</button>
		<span id="status"></span>
	</form>

	<p><a href="/debug">View rendered image</a></p>

	<script>
		async function load() {
			const res = await fetch('/api/state');
			const state = await res.json();
			document.getElementById('level').value = state.level;
			document.getElementById('player_hp').value = state.player_hp;
			document.getElementById('player_attack').value = state.player_attack;
			document.getElementById('player_defence').value = state.player_defence;
			document.getElementById('monster_positions').value = state.monster_positions;
		}

		document.getElementById('form').addEventListener('submit', async (e) => {
			e.preventDefault();
			const body = {
				level: Number(document.getElementById('level').value),
				player_hp: Number(document.getElementById('player_hp').value),
				player_attack: Number(document.getElementById('player_attack').value),
				player_defence: Number(document.getElementById('player_defence').value),
				monster_positions: document.getElementById('monster_positions').value,
			};
			await fetch('/api/state', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(body),
			});
			document.getElementById('status').textContent = 'Saved!';
			setTimeout(() => document.getElementById('status').textContent = '', 2000);
		});

		load();
	</script>
</body>
</html>
